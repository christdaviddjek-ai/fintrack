services:
  - type: web
    name: fintrack
    env: php
    buildCommand: echo "Building fintrack..."
    startCommand: php -S 0.0.0.0:10000
    envVars:
      - key: DB_HOST
        value: localhost
      - key: DB_NAME
        value: postgres
      - key: DB_USER
        value: postgres
      - key: DB_PASSWORD
        value: ""
      - key: DB_PORT
        value: "5432"
      - key: DB_TYPE
        value: postgres
